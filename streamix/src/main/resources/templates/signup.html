<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h2>Sign Up</h2>
    <form th:action="@{/user/register}" method="post">
        <div>
            <label for="userName">Name:</label>
            <input type="text" id="userName" name="userName" required>
        </div>
        <div>
            <label for="userEmailId">Email:</label>
            <input type="email" id="userEmailId" name="userEmailId" required>
        </div>
        <div>
            <label for="userPassword">Password:</label>
            <input type="password" id="userPassword" name="userPassword" required>
        </div>
        <div>
            <label for="userPhoneNo">Phone Number:</label>
            <input type="tel" id="userPhoneNo" name="userPhoneNo" required>
        </div>
        <div>
            <button type="submit">Sign Up</button>
        </div>
        <p th:if="${message}" th:text="${message}"></p>
    </form>
    <p>Already have an account? <a th:href="@{/user/login}">Login</a></p>
</body>
</html>
